name: API Test Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start API in background
        run: npm start &

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/healthcheck | grep -qi "OK"; then
              echo "API is ready!"
              exit 0
            fi
            echo "Attempt $i: API not ready yet, waiting..."
            sleep 2
          done
          echo "API failed to start within 60 seconds"
          exit 1

      - name: Run API tests
        run: npm test
